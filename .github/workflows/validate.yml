name: Validate Submissions

on:
    pull_request:
        paths:
            - "skills/**"
            - "agents/**"
            - "extensions/**"
            - "package.json"
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Install dependencies
              run: npm install

            - name: Validate skills
              run: npm run validate

            - name: Lint markdown
              run: npm run lint

            - name: Generate index
              run: npm run index

            - name: Upload index
              if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: index
                  path: INDEX.json
